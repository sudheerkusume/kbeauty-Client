<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');
body {
    background-color: #0d0d0d;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    font-family: 'Outfit', sans-serif;
}
.signature-premium-card {
    width: 280px;
    height: 380px;
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 12px;
    background: #1a1a1a;
    position: relative;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}
.premium-discount-badge {
    position: absolute;
    top: -1px;
    left: -1px;
    background: #ffffff;
    min-width: 65px;
    padding: 15px 12px 12px 12px;
    border-top-left-radius: 12px;
    border-bottom-right-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 4px 4px 15px rgba(0,0,0,0.3);
    z-index: 10;
}
.discount-val-p {
    font-size: 28px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1;
    margin-bottom: 2px;
}
.animated-percent {
    font-size: 18px;
    color: #e74c3c;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 6px;
}
.discount-label-p {
    font-size: 11px;
    color: #666;
    letter-spacing: 1.5px;
    font-weight: 500;
}
/* keyframes for smooth color */
@keyframes colorKeyframe {
  0% { color: #D4AF37; }
  25% { color: #f26522; }
  50% { color: #c62a32; }
  75% { color: #8e44ad; }
  100% { color: #D4AF37; }
}
.animated-percent {
  animation: colorKeyframe 3s infinite linear;
}
.placeholder-img {
    width: 100%;
    height: 250px;
    background: #fff;
    border-top-left-radius: 12px;
    border-top-right-radius: 12px;
}
</style>
</head>
<body>
    <div class="signature-premium-card">
        <div class="premium-discount-badge">
            <span class="discount-val-p">22</span>
            <span class="animated-percent">%</span>
            <span class="discount-label-p">OFF</span>
        </div>
        <div class="placeholder-img"></div>
    </div>
</body>
</html>
